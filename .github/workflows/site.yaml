name: Render & Deploy Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - targets
  schedule:
    - cron: "0 6 * * 0" # 06:00 UTC on Sunday.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RV_VERSION: v0.21.0
    steps:
      - uses: actions/checkout@v6

      - name: Compute weekly cache key
        id: cache-keys
        run: echo "week=$(date -u +%Y-%V)" >> "$GITHUB_OUTPUT"

      - name: Read pinned R version
        id: rver
        run: |
          ver=$(awk -F'"' '/^r_version[[:space:]]*=/ {print $2; exit}' rproject.toml)
          echo "version=${ver}" >> "$GITHUB_OUTPUT"

      # R itself comes from the official action. rv only manages the locked
      # package library — it resolves P3M binaries and its own cache directly,
      # so use-public-rspm is unnecessary here.
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ steps.rver.outputs.version }}

      - name: Install rv
        run: |
          curl -fsSL "https://github.com/A2-ai/rv/releases/download/${RV_VERSION}/rv-${RV_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | sudo tar -xzC /usr/local/bin
          rv --version

      - name: Cache rv package store and project library
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/rv
            rv/library
          key: rv-${{ runner.os }}-r${{ steps.rver.outputs.version }}-${{ hashFiles('rv.lock') }}
          restore-keys: |
            rv-${{ runner.os }}-r${{ steps.rver.outputs.version }}-

      - name: Cache targets pipeline (weekly)
        uses: actions/cache@v5
        with:
          path: _targets
          key: targets-${{ steps.cache-keys.outputs.week }}
          restore-keys: |
            targets-

      # rv doesn't install system deps itself; `rv sysdeps --only-absent` lists
      # the apt packages the locked dependency tree needs (Ubuntu/Debian only).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          rv sysdeps --only-absent | xargs -r sudo apt-get install -y --no-install-recommends

      - name: Sync R package library
        run: rv sync

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Build pipeline (scrape + render site)
        run: Rscript -e 'targets::tar_make()'

      # tar_option_set(error = "trim") keeps scraping resilient but lets the
      # pipeline exit 0 even when the `site` target errors — guard against
      # publishing a broken/empty site (root 404) by asserting the render exists.
      - name: Verify site rendered
        run: test -f _site/index.html

      - name: Upload site preview artifact (non-main branches)
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: site-${{ github.sha }}
          path: _site
          retention-days: 14

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
